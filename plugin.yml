name: Mise Buildkite Plugin
description: Install mise, run `mise install`, and export the tool environment for Buildkite steps.
author: https://github.com/buildkite-plugins
requirements:
  - curl
  - tar
configuration:
  additionalProperties: false
  properties:
    version:
      type: string
      default: latest
      description: Version of mise to install (for example, 2026.2.11).
    dir:
      type: string
      description: Directory where `mise install` and `mise env` run. Defaults to the checkout directory.
    cache-dir:
      type: string
      description: Directory to use for `MISE_DATA_DIR`. Useful for persistent caches on self-hosted agents.
    image-installs-dir:
      type: string
      description: Directory containing pre-compiled tool installs from an agent image (e.g., /opt/mise/installs). Tools are symlinked into MISE_DATA_DIR to avoid recompilation.
